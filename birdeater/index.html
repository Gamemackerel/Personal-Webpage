<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birdeater</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: url('https://images.unsplash.com/photo-1511497584788-876760111969?w=1920&q=80') center/cover no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
        }
        #gameContainer {
            position: relative;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }
        #ui {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 20px;
            color: white;
            pointer-events: none;
            z-index: 10;
        }
        #score {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        #webHealth {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 200px;
            height: 20px;
            background: rgba(255,255,255,0.2);
            border: 2px solid rgba(255,255,255,0.5);
            border-radius: 10px;
            overflow: hidden;
        }
        #webHealthBar {
            height: 100%;
            background: linear-gradient(90deg, #00ff00, #ffff00);
            transition: width 0.3s ease, background 0.3s ease;
            width: 100%;
        }
        #webHealthBar.danger {
            background: linear-gradient(90deg, #ff0000, #ff6600);
        }
        #modeIndicator {
            position: absolute;
            top: 60px;
            left: 20px;
            font-size: 16px;
            color: #00ff00;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        #buildHint {
            position: absolute;
            top: 90px;
            left: 20px;
            font-size: 14px;
            color: #aaaaaa;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        #huntHint {
            position: absolute;
            top: 110px;
            left: 20px;
            font-size: 14px;
            color: #aaaaaa;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        .game-message {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.5s ease;
            z-index: 100;
        }
        .game-message.show {
            opacity: 1;
        }
        .game-message.top {
            top: 20%;
        }
        .game-message.center {
            top: 50%;
            transform: translate(-50%, -50%);
        }
        .game-message.bottom {
            bottom: 20%;
        }
        .message-title {
            font-size: 48px;
            font-weight: bold;
            color: white;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.8);
            margin-bottom: 10px;
        }
        .message-subtitle {
            font-size: 20px;
            color: #ffffff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            line-height: 1.6;
            max-width: 600px;
            margin: 0 auto;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div id="ui">
            <div id="score">Score: 0 | Wave: 1</div>
            <div id="modeIndicator">Mode: HUNT</div>
            <div id="buildHint">Hold SHIFT to build web</div>
            <div id="huntHint">Arrow keys to move, SPACE to bite</div>
            <div id="webHealth">
                <div id="webHealthBar"></div>
            </div>
        </div>
    </div>
    <script>
// Game variables
        let spider;
        let webNodes = [];
        let webLines = [];
        let score = 0;
        let webHealth = 100;
        let mode = 'HUNT';
        let shiftPressed = false;

        // Build mode variables
        let buildPath = [];
        let hoveredNode = null;
        let hoveredLine = null;
        let spinningProgress = 0;
        let currentSpinSegment = 0;

        // Prey system
        let preyList = [];
        let currentWave = 1;
        let preySpawned = 0;
        let preyKilled = 0;
        let waveComplete = false;
        let webShakeIntensity = 0;
        let totalPreyKilled = 0;
        let waveBreakActive = false;
        let messageCounter = 0;

        // Web configuration
        const RADIAL_SPOKES = 8;
        const CIRCULAR_RINGS = 5;
        const WEB_RADIUS = 250;
        const NODE_SNAP_RADIUS = 15;
        const LINE_SNAP_DISTANCE = 10;
        const MAX_CONNECTIONS = 8;
        const SPIDER_SPEED = 3;
        const SPIDER_SPIN_SPEED = 1;
        const INITIAL_WEB_LINES = 80;

        // Prey configuration
        const PREY_TYPES = {
            FLEA: { name: 'Flea', points: 10, escapeTime: 8000, bites: 1, minDamage: 0, maxDamage: 1, size: 10, emoji: '🦟' },
            GNAT: { name: 'Gnat', points: 25, escapeTime: 7000, bites: 2, minDamage: 1, maxDamage: 2, size: 14, emoji: '🪰' },
            MOSQUITO: { name: 'Mosquito', points: 50, escapeTime: 6000, bites: 3, minDamage: 2, maxDamage: 3, size: 18, emoji: '🦟' },
            HOUSEFLY: { name: 'Housefly', points: 100, escapeTime: 5000, bites: 4, minDamage: 2, maxDamage: 3, size: 24, emoji: '🪲' },
            HORSEFLY: { name: 'Horsefly', points: 200, escapeTime: 4000, bites: 5, minDamage: 3, maxDamage: 4, size: 30, emoji: '🐝' },
            DRAGONFLY: { name: 'Dragonfly', points: 400, escapeTime: 3500, bites: 6, minDamage: 4, maxDamage: 5, size: 38, emoji: '🦋' },
            SPARROW: { name: 'Sparrow', points: 1000, escapeTime: 10000, bites: 10, minDamage: 5, maxDamage: 6, size: 50, emoji: '🐦', isBoss: true }
        };

        const WAVES = [
            [PREY_TYPES.FLEA, PREY_TYPES.FLEA, PREY_TYPES.GNAT],
            [PREY_TYPES.FLEA, PREY_TYPES.FLEA, PREY_TYPES.GNAT, PREY_TYPES.GNAT],
            [PREY_TYPES.FLEA, PREY_TYPES.GNAT, PREY_TYPES.GNAT, PREY_TYPES.MOSQUITO],
            [PREY_TYPES.GNAT, PREY_TYPES.GNAT, PREY_TYPES.MOSQUITO, PREY_TYPES.MOSQUITO],
            [PREY_TYPES.GNAT, PREY_TYPES.MOSQUITO, PREY_TYPES.MOSQUITO, PREY_TYPES.HOUSEFLY],
            [PREY_TYPES.MOSQUITO, PREY_TYPES.MOSQUITO, PREY_TYPES.HOUSEFLY, PREY_TYPES.HOUSEFLY],
            [PREY_TYPES.MOSQUITO, PREY_TYPES.HOUSEFLY, PREY_TYPES.HOUSEFLY, PREY_TYPES.HORSEFLY],
            [PREY_TYPES.HOUSEFLY, PREY_TYPES.HOUSEFLY, PREY_TYPES.HORSEFLY, PREY_TYPES.HORSEFLY],
            [PREY_TYPES.HOUSEFLY, PREY_TYPES.HORSEFLY, PREY_TYPES.HORSEFLY, PREY_TYPES.DRAGONFLY],
            [PREY_TYPES.HORSEFLY, PREY_TYPES.DRAGONFLY, PREY_TYPES.SPARROW]
        ];

        class WebNode {
            constructor(x, y, id) {
                this.x = x;
                this.y = y;
                this.id = id;
                this.connections = new Set();
            }

            canConnect() {
                return this.connections.size < MAX_CONNECTIONS;
            }

            display() {
                push();
                if (mode === 'BUILD' && hoveredNode === this) {
                    fill(100, 255, 100, 255);
                    circle(this.x, this.y, 12);
                } else if (mode === 'BUILD' && buildPath.includes(this)) {
                    fill(255, 255, 100, 255);
                    circle(this.x, this.y, 10);
                }
                fill(255, 255, 255, 200);
                noStroke();
                circle(this.x, this.y, 6);
                if (mode === 'BUILD') {
                    textAlign(CENTER, CENTER);
                    textSize(10);
                    fill(255);
                    text(this.connections.size, this.x, this.y - 12);
                }
                pop();
            }
        }
class WebLine {
            constructor(node1, node2, isNew = false) {
                this.node1 = node1;
                this.node2 = node2;
                this.active = true;
                this.opacity = 255;
                this.isNew = isNew;
                this.spinProgress = 0;
                this.wobble = 0;
                this.wobbleSpeed = 0;
                this.isBeingSpun = false;
                this.sag = random(0.05, 0.15);
                this.wavePhase = random(TWO_PI);
                this.tension = 1;
            }

            getMidpoint() {
                return { x: (this.node1.x + this.node2.x) / 2, y: (this.node1.y + this.node2.y) / 2 };
            }

            distanceToPoint(px, py) {
                let x1 = this.node1.x, y1 = this.node1.y, x2 = this.node2.x, y2 = this.node2.y;
                let A = px - x1, B = py - y1, C = x2 - x1, D = y2 - y1;
                let dot = A * C + B * D, lenSq = C * C + D * D, param = lenSq != 0 ? dot / lenSq : -1;
                let xx, yy;
                if (param < 0) { xx = x1; yy = y1; }
                else if (param > 1) { xx = x2; yy = y2; }
                else { xx = x1 + param * C; yy = y1 + param * D; }
                let dx = px - xx, dy = py - yy;
                return sqrt(dx * dx + dy * dy);
            }

            display() {
                if (!this.active) return;
                push();
                let wobbleOffset = 0;
                if (this.wobble > 0) {
                    wobbleOffset = sin(frameCount * this.wobbleSpeed) * this.wobble;
                    this.wobble *= 0.95;
                }
                let sway = sin(frameCount * 0.02 + this.wavePhase) * 0.5;
                this.tension = lerp(this.tension, 1, 0.05);

                if (mode === 'BUILD' && hoveredLine === this) {
                    stroke(100, 255, 100, 100);
                    strokeWeight(4);
                    this.drawCurvedLine(wobbleOffset, sway);
                }

                if (this.isNew && this.spinProgress < 1) {
                    stroke(255, 255, 100, 200);
                    strokeWeight(2);
                    let x2 = lerp(this.node1.x, this.node2.x, this.spinProgress);
                    let y2 = lerp(this.node1.y, this.node2.y, this.spinProgress);
                    noFill();
                    beginShape();
                    for (let t = 0; t <= this.spinProgress; t += 0.05) {
                        let x = lerp(this.node1.x, x2, t);
                        let y = lerp(this.node1.y, y2, t);
                        let curve = sin(t * PI) * this.sag * 20 * this.tension;
                        vertex(x + wobbleOffset + sway, y + curve);
                    }
                    endShape();
                    stroke(255, 255, 255, 100);
                    strokeWeight(1);
                    for (let i = 0; i < 3; i++) {
                        let offset = (frameCount * 0.1 + i * 0.3) % 1;
                        if (offset <= this.spinProgress) {
                            let px = lerp(this.node1.x, x2, offset);
                            let py = lerp(this.node1.y, y2, offset);
                            let curve = sin(offset * PI) * this.sag * 20 * this.tension;
                            point(px + wobbleOffset + sway, py + curve);
                        }
                    }
                } else {
                    if (this.isNew && this.spinProgress >= 1) this.isNew = false;
                    stroke(255, 255, 255, this.opacity);
                    strokeWeight(1.5);
                    this.drawCurvedLine(wobbleOffset, sway);
                }

                if (mode === 'BUILD' && hoveredLine === this) {
                    let mid = this.getMidpoint();
                    fill(100, 255, 100, 200);
                    noStroke();
                    circle(mid.x + wobbleOffset + sway, mid.y, 8);
                }
                pop();
            }

            drawCurvedLine(wobbleOffset, sway) {
                noFill();
                beginShape();
                for (let t = 0; t <= 1; t += 0.05) {
                    let x = lerp(this.node1.x, this.node2.x, t);
                    let y = lerp(this.node1.y, this.node2.y, t);
                    let curve = sin(t * PI) * this.sag * 20 * this.tension;
                    vertex(x + wobbleOffset + sway, y + curve);
                }
                endShape();
            }

            applyForce(force) {
                this.tension = max(0.5, this.tension - force);
            }
        }
